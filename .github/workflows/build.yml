name: build-cht

# 三平台打包:每個 job 自編 SDL2 → clone 對應版本的 ScummVM → 套 scumm-cjk.patch →
# 編 scumm 引擎 → 連同輕量中文資產(字型/譯表/標題)打成 slim 包(玩家自備遊戲資料)。
# 中文「語音」(272MB)與原版遊戲資料不入公開 CI(版權/體積)——走本機 scripts/package_linux.sh。
#
# 註:此 workflow 在 GitHub runner 上才實跑,可能需 1-2 次微調(rule 82 跨平台差異:
# clang/mingw 嚴格度、macOS universal、SDL2 版本相容)。本機只驗證了 Linux 引擎與打包。

on:
  workflow_dispatch:
  push:
    tags: ['v*']

env:
  SCUMMVM_REF: ae89011b          # scumm-cjk.patch 所基於的 upstream commit
  SDL2_VER: '2.30.9'

jobs:
  # ---------------------------------------------------------------- Linux
  linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential nasm pkg-config python3 \
            libvorbis-dev libmad0-dev libflac-dev libpng-dev libfreetype-dev \
            libtheora-dev libfluidsynth-dev zlib1g-dev
      - name: build SDL2 from source
        run: |
          curl -L "https://github.com/libsdl-org/SDL/releases/download/release-${SDL2_VER}/SDL2-${SDL2_VER}.tar.gz" | tar xz
          cd "SDL2-${SDL2_VER}"
          ./configure --prefix="$GITHUB_WORKSPACE/sdl2" --disable-shared --enable-static
          make -j"$(nproc)" && make install
      - name: scummvm + patch
        run: |
          git clone --depth 1 https://github.com/scummvm/scummvm.git sv
          cd sv && git fetch --depth 1 origin "$SCUMMVM_REF" && git checkout "$SCUMMVM_REF"
          git apply "$GITHUB_WORKSPACE/patches/scumm-cjk.patch"
      - name: build CHT text table
        run: |
          mkdir -p assets
          python3 tools/build_translation.py --out "$GITHUB_WORKSPACE/assets/atlantis_zh.tab"
      - name: configure + build
        run: |
          cd sv
          PATH="$GITHUB_WORKSPACE/sdl2/bin:$PATH" \
          ./configure --disable-all-engines --enable-engine=scumm \
            --with-sdl-prefix="$GITHUB_WORKSPACE/sdl2" --enable-release
          make -j"$(nproc)"
      - name: package (slim)
        run: |
          P=dist/indyatlantis-cht-linux-x86_64-slim
          mkdir -p "$P/bin" "$P/lib" "$P/data"
          cp sv/scummvm "$P/bin/"
          ldd sv/scummvm | awk '/=>/{print $3}' | grep -E '\.so' \
            | grep -viE '/(libc|libm|libpthread|libdl|librt|ld-linux|libstdc\+\+|libgcc_s)\.' \
            | xargs -I{} cp -Ln {} "$P/lib/" 2>/dev/null || true
          cp fonts/atlantis_zh16.dcjk fonts/atlantis_zh24.dcjk fonts/atlantis_title.spr "$P/data/"
          cp assets/atlantis_zh.tab "$P/data/" 2>/dev/null || python3 tools/build_translation.py --out "$P/data/atlantis_zh.tab"
          cp packaging/play.sh "$P/play.sh"
          printf '印第安納·瓊斯:亞特蘭提斯之謎 — 繁中版 (slim)\n執行 ./play.sh；F8 切字幕語言、F9 切語音。\n此版不含原版遊戲資料,請自備合法持有的 ATLANTIS.000/.001/MONSTER.SOU 放進 data/。\n' > "$P/README.txt"
          tar czf indyatlantis-cht-linux-x86_64-slim.tar.gz -C dist indyatlantis-cht-linux-x86_64-slim
      - uses: actions/upload-artifact@v4
        with: { name: linux-slim, path: indyatlantis-cht-linux-x86_64-slim.tar.gz }

  # ---------------------------------------------------------------- Windows
  windows:
    runs-on: windows-2022
    defaults: { run: { shell: 'msys2 {0}' } }
    steps:
      - uses: actions/checkout@v4
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: >-
            git make nasm pkg-config python
            mingw-w64-x86_64-toolchain mingw-w64-x86_64-libvorbis
            mingw-w64-x86_64-libmad mingw-w64-x86_64-flac mingw-w64-x86_64-libpng
            mingw-w64-x86_64-freetype mingw-w64-x86_64-zlib
      - name: build SDL2 from source
        run: |
          curl -L "https://github.com/libsdl-org/SDL/releases/download/release-${SDL2_VER}/SDL2-${SDL2_VER}.tar.gz" | tar xz
          cd "SDL2-${SDL2_VER}"
          ./configure --prefix="$PWD/../sdl2" --disable-shared --enable-static
          make -j"$(nproc)" && make install
      - name: scummvm + patch
        run: |
          git clone --depth 1 https://github.com/scummvm/scummvm.git sv
          cd sv && git fetch --depth 1 origin "$SCUMMVM_REF" && git checkout "$SCUMMVM_REF"
          git apply ../patches/scumm-cjk.patch
      - name: configure + build
        run: |
          cd sv
          PATH="$PWD/../sdl2/bin:$PATH" \
          ./configure --host=mingw-w64 --disable-all-engines --enable-engine=scumm \
            --with-sdl-prefix="$PWD/../sdl2" --enable-release
          make -j"$(nproc)"
      - name: package (slim)
        run: |
          P=dist/indyatlantis-cht-win64-slim
          mkdir -p "$P/data"
          cp sv/scummvm.exe "$P/"
          # bundle the mingw runtime + SDL2 DLLs scummvm.exe needs
          for d in libgcc_s_seh-1 libstdc++-6 libwinpthread-1 SDL2 libvorbis-0 libvorbisfile-3 libogg-0 libmad-0 libFLAC-* libpng16-16 libfreetype-6 zlib1; do
            cp /mingw64/bin/$d.dll "$P/" 2>/dev/null || true
          done
          python3 tools/build_translation.py --out "$P/data/atlantis_zh.tab"
          cp fonts/atlantis_zh16.dcjk fonts/atlantis_zh24.dcjk fonts/atlantis_title.spr "$P/data/"
          printf '@echo off\r\nscummvm.exe -p data --auto-detect %%*\r\n' > "$P/play.bat"
      - uses: actions/upload-artifact@v4
        with: { name: windows-slim, path: dist/indyatlantis-cht-win64-slim }

  # ---------------------------------------------------------------- macOS (universal)
  macos:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
      - name: deps
        run: brew install nasm pkg-config libvorbis mad flac libpng freetype python || true
      - name: build SDL2 from source (universal)
        run: |
          curl -L "https://github.com/libsdl-org/SDL/releases/download/release-${SDL2_VER}/SDL2-${SDL2_VER}.tar.gz" | tar xz
          cd "SDL2-${SDL2_VER}"
          ./configure --prefix="$GITHUB_WORKSPACE/sdl2" --disable-shared --enable-static \
            CFLAGS="-arch x86_64 -arch arm64" LDFLAGS="-arch x86_64 -arch arm64"
          make -j"$(sysctl -n hw.ncpu)" && make install
      - name: scummvm + patch
        run: |
          git clone --depth 1 https://github.com/scummvm/scummvm.git sv
          cd sv && git fetch --depth 1 origin "$SCUMMVM_REF" && git checkout "$SCUMMVM_REF"
          git apply ../patches/scumm-cjk.patch
      - name: configure + build (universal)
        run: |
          cd sv
          PATH="$GITHUB_WORKSPACE/sdl2/bin:$PATH" \
          ./configure --disable-all-engines --enable-engine=scumm \
            --with-sdl-prefix="$GITHUB_WORKSPACE/sdl2" --enable-release \
            --extra-cflags="-arch x86_64 -arch arm64" --extra-ldflags="-arch x86_64 -arch arm64"
          make -j"$(sysctl -n hw.ncpu)"
      - name: package (.app, slim)
        run: |
          A="dist/Indy Atlantis CHT.app/Contents"
          mkdir -p "$A/MacOS" "$A/Resources/data"
          cp sv/scummvm "$A/MacOS/scummvm"
          python3 tools/build_translation.py --out "$A/Resources/data/atlantis_zh.tab"
          cp fonts/atlantis_zh16.dcjk fonts/atlantis_zh24.dcjk fonts/atlantis_title.spr "$A/Resources/data/"
          cat > "$A/Info.plist" <<PLIST
          <?xml version="1.0"?><!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>CFBundleExecutable</key><string>launch.sh</string>
            <key>CFBundleIdentifier</key><string>tw.wicanr2.indyatlantis.cht</string>
            <key>CFBundleName</key><string>Indy Atlantis CHT</string>
          </dict></plist>
          PLIST
          printf '#!/bin/sh\ncd "$(dirname "$0")"\nexec ./scummvm -p ../Resources/data --auto-detect "$@"\n' > "$A/MacOS/launch.sh"
          chmod +x "$A/MacOS/launch.sh" "$A/MacOS/scummvm"
          hdiutil create -volname "Indy Atlantis CHT" -srcfolder dist -ov -format UDZO indyatlantis-cht-macos-universal-slim.dmg
      - uses: actions/upload-artifact@v4
        with: { name: macos-slim, path: indyatlantis-cht-macos-universal-slim.dmg }
